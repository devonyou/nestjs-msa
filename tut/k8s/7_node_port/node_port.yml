apiVersion: v1
kind: Service
metadata:
    name: nginx-service
spec:
    selector:
        app: nginx-app # deployment.ymlмЭШ podмЩА лІ§мє≠
    type: NodePort
    ports:
        - port: 80 # ServiceмЭШ нПђнКЄ
          targetPort: 80 # ContainerмЭШ лВілґА нПђнКЄ
          nodePort: 30080 # External нПђнКЄ (мЩЄлґАм†СкЈЉ)
